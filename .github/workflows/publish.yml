name: Publish to pub.dev

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publishing)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    # Only run if it was a push/tag OR a merged pull request OR manually triggered
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
      id-token: write # Required for authentication via Google Cloud OIDC
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: ✨ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze

      - name: 🧪 Dry-run Publishing
        run: flutter pub publish --dry-run

      - name: 🚀 Publish to pub.dev
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry-run == false }}
        run: flutter pub publish --force

      - name: 📝 Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == true }}
        run: |
          echo "## 🧪 Dry-run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The workflow completed successfully in **dry-run** mode." >> $GITHUB_STEP_SUMMARY
          echo "Analysis and tests passed, and the package is valid for publishing." >> $GITHUB_STEP_SUMMARY
          echo "No changes were pushed to pub.dev." >> $GITHUB_STEP_SUMMARY

